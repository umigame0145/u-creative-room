<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>コピペったん - Uの創作部屋</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="../common/style.css">
</head>
<body class="bg-gray-50 text-gray-900 font-sans">
    <div id="common-header"></div>

    <main class="max-w-2xl mx-auto px-4 py-8">
        <div class="mb-8 text-center">
            <h1 class="text-3xl font-bold text-gray-800 mb-2">コピペったん</h1>
            <p class="text-gray-600">素材をポチポチ選んで、ストック＆コピー！</p>
        </div>

        <section class="bg-white p-6 rounded-3xl shadow-sm border border-gray-100 mb-6">
            <div class="flex justify-between items-center mb-2">
                <label class="text-sm font-bold text-gray-700">文字列作成エリア</label>
                <button id="clearAllBtn" class="text-xs font-bold text-red-400 hover:text-red-600 transition">全クリア</button>
            </div>
            <textarea id="mainTextArea" class="w-full h-40 p-4 bg-gray-50 border-2 border-gray-100 rounded-2xl focus:border-blue-400 focus:ring-0 outline-none transition resize-none font-mono" placeholder="ここに文字が溜まっていきます..."></textarea>
            
            <div class="grid grid-cols-1 md:grid-cols-3 gap-2 mt-4">
                <button id="copyBtn" class="md:col-span-2 py-3 bg-blue-600 text-white rounded-xl font-bold shadow-md hover:bg-blue-700 active:scale-95 transition">📋 クリップボードにコピー</button>
                <button id="saveStockBtn" class="py-3 bg-green-600 text-white rounded-xl font-bold shadow-md hover:bg-green-700 active:scale-95 transition">💾 保存する</button>
                <button id="undoBtn" class="md:col-span-3 py-2 bg-gray-100 text-gray-500 rounded-xl font-bold hover:bg-gray-200 disabled:opacity-30 disabled:cursor-not-allowed transition" disabled>↩︎ 戻す</button>
            </div>
        </section>

        <section class="bg-white p-6 rounded-3xl shadow-sm border border-gray-100 mb-6">
            <label class="block text-sm font-bold text-gray-700 mb-4">素材文字列</label>
            
            <div id="materialInputContainer" class="space-y-3 mb-4">
                <div class="flex gap-2 material-row">
                    <input type="text" class="flex-1 p-3 bg-gray-50 border-0 rounded-xl font-bold outline-none material-input" placeholder="素材を入力">
                    <button class="px-6 py-3 bg-gray-800 text-white rounded-xl font-bold hover:bg-black transition add-to-main-btn">追加</button>
                </div>
            </div>

            <button id="addNewRowBtn" class="w-full py-2 bg-gray-100 text-gray-400 rounded-xl font-bold hover:bg-gray-200 hover:text-gray-600 transition text-2xl">+</button>
        </section>

        <section class="bg-white p-6 rounded-3xl shadow-sm border border-gray-100">
            <label class="block text-sm font-bold text-gray-700 mb-4">保存済み文字列</label>
            <div id="stockList" class="space-y-3">
                </div>
        </section>
    </main>

    <div id="common-footer"></div>
    <script src="../common/site-data.js"></script>
    <script src="../common/site-manager.js"></script>
    <script src="copy-pattan.js"></script>
</body>
</html>
