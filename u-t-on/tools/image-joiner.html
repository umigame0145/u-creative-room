<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>画像結合ツール - Uの創作部屋</title>

    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:image" content="https://your-domain.com/common/ogp-image-joiner.jpg">

    <script src="https://cdn.jsdelivr.net/npm/heic2any@0.0.4/dist/heic2any.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="../common/style.css">

    <script src="../common/seo-config.js"></script>
    <script src="image-joiner.js"></script>
</head>
<body class="bg-gray-50 text-gray-900 font-sans">
    <div id="common-header"></div>

    <main class="max-w-4xl mx-auto px-4 py-8">
        <div class="mb-8">
            <h1 class="text-3xl font-bold text-gray-800 mb-2">画像結合ツール</h1>
            <p class="text-gray-600">複数の画像を縦や横に繋げて、1枚の画像に結合します。</p>
        </div>

        <section class="bg-white p-6 rounded-3xl shadow-sm border border-gray-100 mb-8">
            <div class="flex items-center gap-2 mb-4">
                <label class="text-sm font-bold text-gray-700 tracking-wider">STEP 1: 画像の選択</label>
                <div class="info-icon" tabindex="0">
                    <span class="inline-flex items-center justify-center w-4 h-4 text-[10px] font-bold text-gray-400 border border-gray-300 rounded-full">i</span>
                    <div class="tooltip-box" data-explain-id="step1_upload"></div>
                </div>
            </div>
            <div id="dropZone" class="relative border-2 border-dashed border-gray-200 rounded-2xl p-8 text-center hover:border-blue-400 transition-all group">
                <input type="file" id="imageInput" multiple accept="image/*,.heic,.heif,.tiff,.tif" class="absolute inset-0 w-full h-full opacity-0 cursor-pointer z-10">
                <div class="text-blue-600 font-bold group-hover:scale-105 transition-transform">
                    画像をドラッグ＆ドロップ、またはクリックで選択
                </div>
                <p class="text-xs text-gray-400 mt-2">※HEIC, TIFF対応</p>
            </div>
        </section>

        <section id="sortSection" class="hidden bg-white p-6 rounded-3xl shadow-sm border border-gray-100 mb-8">
            <div class="flex items-center gap-2 mb-4">
                <label class="text-sm font-bold text-gray-700 tracking-wider">STEP 2: 並び替え・管理</label>
                <div class="info-icon" tabindex="0">
                    <span class="inline-flex items-center justify-center w-4 h-4 text-[10px] font-bold text-gray-400 border border-gray-300 rounded-full">i</span>
                    <div class="tooltip-box" data-explain-id="step2_sort"></div>
                </div>
            </div>
            <div id="thumbContainer" class="flex gap-4 p-4 bg-gray-50 rounded-2xl overflow-x-auto min-h-[140px]"></div>
        </section>

        <section class="bg-white p-6 rounded-3xl shadow-sm border border-gray-100 mb-8">
            <h2 class="text-lg font-bold text-gray-700 mb-6 flex items-center">STEP 3: 結合設定</h2>
            
            <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
                <div class="space-y-6">
                    <div>
                        <div class="flex items-center gap-2 mb-2">
                            <label class="text-sm font-bold text-gray-600">結合方向</label>
                            <div class="info-icon" tabindex="0">
                                <span class="inline-flex items-center justify-center w-4 h-4 text-[10px] font-bold text-gray-400 border border-gray-300 rounded-full">i</span>
                                <div class="tooltip-box" data-explain-id="step3_direction"></div>
                            </div>
                        </div>
                        <div class="flex gap-2">
                            <button id="dirVertical" class="flex-1 py-3 rounded-xl font-bold bg-blue-600 text-white shadow-md transition">縦に並べる</button>
                            <button id="dirHorizontal" class="flex-1 py-3 rounded-xl font-bold bg-gray-100 text-gray-600 hover:bg-gray-200 transition">横に並べる</button>
                        </div>
                    </div>

                    <div>
                        <div class="flex items-center gap-2 mb-2">
                            <label class="text-sm font-bold text-gray-600">背景色</label>
                            <div class="info-icon" tabindex="0">
                                <span class="inline-flex items-center justify-center w-4 h-4 text-[10px] font-bold text-gray-400 border border-gray-300 rounded-full">i</span>
                                <div class="tooltip-box" data-explain-id="step4_bgcolor"></div>
                            </div>
                        </div>
                        <div class="flex items-center gap-4">
                            <input type="color" id="bgColor" class="w-12 h-12 rounded-lg border-0 cursor-pointer" value="#ffffff">
                            <label class="flex items-center gap-2 text-sm font-bold text-gray-600 cursor-pointer">
                                <input type="checkbox" id="transparentBg" class="w-4 h-4 rounded border-gray-300 text-blue-600 focus:ring-blue-500">
                                背景を透過させる
                            </label>
                        </div>
                    </div>
                </div>

                <div class="space-y-6">
                    <div>
                        <div class="flex items-center gap-2 mb-2">
                            <label class="text-sm font-bold text-gray-600">サイズ調整の基準</label>
                            <div class="info-icon" tabindex="0">
                                <span class="inline-flex items-center justify-center w-4 h-4 text-[10px] font-bold text-gray-400 border border-gray-300 rounded-full">i</span>
                                <div class="tooltip-box" data-explain-id="step5_sync"></div>
                            </div>
                        </div>
                        <select id="sizeBase" class="w-full p-3 bg-gray-50 border-0 rounded-xl font-bold text-gray-700 outline-none appearance-none cursor-pointer">
                            <option value="none">調整なし（そのまま）</option>
                            <option value="max">一番大きい画像に合わせる</option>
                            <option value="min">一番小さい画像に合わせる</option>
                        </select>
                    </div>

                    <div>
                        <div class="flex items-center gap-2 mb-2">
                            <label class="text-sm font-bold text-gray-600">保存形式</label>
                            <div class="info-icon" tabindex="0">
                                <span class="inline-flex items-center justify-center w-4 h-4 text-[10px] font-bold text-gray-400 border border-gray-300 rounded-full">i</span>
                                <div class="tooltip-box" data-explain-id="step6_format"></div>
                            </div>
                        </div>
                        <select id="saveFormat" class="w-full p-3 bg-gray-50 border-0 rounded-xl font-bold text-gray-700 outline-none appearance-none cursor-pointer">
                            <option value="image/png">PNG（高画質・透過対応）</option>
                            <option value="image/jpeg">JPEG（ファイルサイズ軽量）</option>
                            <option value="image/webp">WebP（次世代形式）</option>
                        </select>
                    </div>
                </div>
            </div>

            <div class="mt-8">
                <div class="flex items-center gap-2 mb-2">
                    <label class="text-sm font-bold text-gray-600">保存ファイル名</label>
                    <div class="info-icon" tabindex="0">
                        <span class="inline-flex items-center justify-center w-4 h-4 text-[10px] font-bold text-gray-400 border border-gray-300 rounded-full">i</span>
                        <div class="tooltip-box" data-explain-id="step6_filename"></div>
                    </div>
                </div>
                <input type="text" id="fileNameInput" class="w-full p-3 bg-gray-50 border-0 rounded-xl font-bold text-gray-700 outline-none" placeholder="結合画像のファイル名を入力">
            </div>
        </section>

        <button id="generateBtn" class="w-full py-4 bg-blue-600 text-white rounded-2xl font-bold text-lg shadow-lg hover:bg-blue-700 transition active:scale-95 disabled:bg-gray-300 mb-12">
            結合画像を作成する
        </button>

        <section id="previewSection" class="hidden bg-white p-6 rounded-3xl shadow-sm border border-gray-100 mb-12">
            <div class="flex items-center justify-between mb-6">
                <h2 class="text-lg font-bold text-gray-700">PREVIEW: 結合結果</h2>
                <div class="info-icon" tabindex="0">
                    <span class="inline-flex items-center justify-center w-4 h-4 text-[10px] font-bold text-gray-400 border border-gray-300 rounded-full">i</span>
                    <div class="tooltip-box" data-explain-id="step7_preview"></div>
                </div>
            </div>
            
            <div id="canvasWrapper" class="relative bg-gray-100 rounded-2xl overflow-auto p-4 flex justify-center items-start">
                <canvas id="resultCanvas" class="max-w-full h-auto"></canvas>
            </div>

            <div id="actionArea" class="mt-8 text-center">
                <button id="downloadBtn" class="w-full md:w-auto py-4 px-12 bg-green-600 hover:bg-green-700 text-white rounded-full font-extrabold shadow-lg transition transform hover:scale-105 active:scale-95">
                    名前をつけて保存する
                </button>
            </div>
        </section>

        <div id="explanationSummaryArea" class="mt-12 border-t pt-10 space-y-8">
            <h2 class="text-lg font-bold text-gray-800 text-center mb-6">ツールの使い方・詳細説明</h2>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
                <div data-explain-block="step1_upload" class="p-5 bg-gray-50 rounded-2xl border border-gray-100"></div>
                <div data-explain-block="step2_sort" class="p-5 bg-gray-50 rounded-2xl border border-gray-100"></div>
                <div data-explain-block="step3_direction" class="p-5 bg-gray-50 rounded-2xl border border-gray-100"></div>
                <div data-explain-block="step4_bgcolor" class="p-5 bg-gray-50 rounded-2xl border border-gray-100"></div>
                <div data-explain-block="step5_sync" class="p-5 bg-gray-50 rounded-2xl border border-gray-100"></div>
                <div data-explain-block="step6_format" class="p-5 bg-gray-50 rounded-2xl border border-gray-100"></div>
                <div data-explain-block="step7_preview" class="p-5 bg-gray-50 rounded-2xl border border-gray-100"></div>
            </div>
        </div>
    </main>

    <div id="common-footer"></div>
    <script src="../common/site-data.js"></script>
    <script src="../common/site-manager.js"></script>
</body>
</html>
