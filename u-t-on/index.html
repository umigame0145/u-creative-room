<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Uの創作部屋 - 便利ツール集</title>

    <meta property="og:url" content="https://u-t-on.com/index.html" />
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Uの創作部屋 - 便利ツール集" />
    <meta property="og:description" content="インストール不要で安全なブラウザ完結型ツール集です。" />
    <meta property="og:image" content="https://u-t-on.com/common/icon/home_ogp.png" />
    <meta name="twitter:card" content="summary_large_image" />

    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="common/style.css">

    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-6820046630207239"
     crossorigin="anonymous"></script>
</head>
<body class="bg-gray-50 text-gray-900 font-sans">

    <div id="common-header"></div>

    <main class="max-w-6xl mx-auto px-4 py-12">
        <div class="w-full">
            <div class="mb-12 text-center">
                <h2 class="text-4xl md:text-5xl font-extrabold text-gray-900 mb-6 tracking-tight">
                    Uの創作部屋へ、<br class="md:hidden">
                    <span class="text-blue-600">ようこそ。</span>
                </h2>
                <div class="text-lg text-gray-600 max-w-2xl leading-relaxed mx-auto">
                    <p class="mb-2">サイト主が勉強のためにいろいろ作っています。</p>
                    <p class="mb-2">基本的にはサーバーにアップロードや保存されない方法で作っています。</p>
                    <p>「あったらいいな」を今後も実装予定（サイト主の気まぐれ）です。</p>
                </div>
            </div>

            <div class="mb-12 max-w-4xl mx-auto">
                <div class="bg-white border border-gray-100 rounded-2xl p-6 shadow-sm">
                    <div class="flex items-center justify-between mb-4">
                        <div class="flex items-center gap-2">
                            <span class="flex h-2 w-2 rounded-full bg-blue-600 animate-ping"></span>
                            <h3 class="text-sm font-bold text-gray-800 tracking-wider">お知らせ / アップデート</h3>
                        </div>
                        <button id="toggle-news-btn" class="text-xs text-blue-600 hover:text-blue-800 font-bold flex items-center gap-1 focus:outline-none">
                            <span id="toggle-text">アップデート内容を表示</span>
                            <span id="toggle-icon" class="inline-block transition-transform duration-300">▼</span>
                        </button>
                    </div>
                    <div id="news-container" class="h-[32px] overflow-hidden transition-all duration-300 ease-in-out custom-scrollbar pr-1">
                        <ul id="news-list" class="space-y-3">
                            </ul>
                    </div>
                </div>
            </div>

            <div id="tool-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
                </div>
        </div>

        </main>

    <div id="common-footer"></div>

    <script src="common/site-data.js"></script>
    <script src="common/site-manager.js"></script>
</body>
</html>
